<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 TODO — 리스트 개선 데모</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0f4f8;
      --white:    #ffffff;
      --border:   #e2e8f0;
      --border2:  #cbd5e1;
      --text:     #0f172a;
      --text2:    #334155;
      --muted:    #64748b;
      --faint:    #94a3b8;
      --blue:     #2563eb;
      --blue-bg:  #eff6ff;
      --radius:   10px;
      --shadow:   0 1px 4px rgba(0,0,0,.07);
      --shadow2:  0 4px 16px rgba(0,0,0,.10);

      /* priority */
      --urgent-c: #dc2626; --urgent-bg: #fef2f2; --urgent-border: #fecaca;
      --high-c:   #d97706; --high-bg:   #fffbeb; --high-border:   #fde68a;
      --mid-c:    #2563eb; --mid-bg:    #eff6ff; --mid-border:    #bfdbfe;
      --low-c:    #64748b; --low-bg:    #f8fafc; --low-border:    #e2e8f0;

      /* status */
      --wait-c:   #64748b; --wait-bg:   #f1f5f9;
      --inprog-c: #2563eb; --inprog-bg: #dbeafe;
      --review-c: #d97706; --review-bg: #fef3c7;
      --done-c:   #16a34a; --done-bg:   #dcfce7;
    }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── HEADER ────────────────────────────────── */
    .app-header {
      position: sticky; top: 0; z-index: 200;
      height: 54px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      display: flex; align-items: center; padding: 0 24px;
      gap: 12px; box-shadow: 0 2px 8px rgba(30,58,138,.3);
    }
    .app-header-logo {
      display: flex; align-items: center; gap: 10px; flex: 1;
    }
    .app-header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .app-header-title { color: #fff; font-size: 16px; font-weight: 700; }
    .app-header-actions { display: flex; gap: 8px; align-items: center; }
    .hbtn {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: 16px; cursor: pointer;
      transition: background .15s;
    }
    .hbtn:hover { background: rgba(255,255,255,.28); }
    .hbadge {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 12px;
      padding: 4px 12px; border-radius: 16px;
    }

    /* ── NAV TABS ──────────────────────────────── */
    .app-nav {
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 24px; gap: 2px;
      position: sticky; top: 54px; z-index: 190;
    }
    .nav-tab {
      padding: 12px 16px; font-size: 13px; font-weight: 500;
      color: var(--muted); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      margin-bottom: -1px; transition: all .15s;
    }
    .nav-tab.active {
      color: var(--blue); font-weight: 700;
      border-bottom-color: var(--blue); background: var(--blue-bg);
    }

    /* ── MAIN LAYOUT ───────────────────────────── */
    .app-body {
      display: flex;
      min-height: calc(100vh - 54px - 45px);
    }

    /* ── LEFT SIDEBAR ──────────────────────────── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 14px 12px;
      position: sticky; top: 99px;
      height: calc(100vh - 99px);
      overflow-y: auto;
    }

    .sidebar-section { margin-bottom: 14px; }
    .sidebar-section-title {
      font-size: 10px; font-weight: 800;
      letter-spacing: .10em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 4px;
      padding-bottom: 5px; border-bottom: 1px solid var(--border);
    }

    /* Search in sidebar */
    .search-wrap {
      position: relative; margin-bottom: 12px;
    }
    .search-icon {
      position: absolute; left: 8px; top: 50%;
      transform: translateY(-50%); color: var(--faint); font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 7px 8px 7px 28px;
      border: 1.5px solid var(--border2); border-radius: 7px;
      font-size: 12px; font-family: inherit;
      outline: none; color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .search-input::placeholder { color: var(--faint); }
    .search-clear {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      background: var(--border); border: none;
      color: var(--muted); border-radius: 50%;
      width: 18px; height: 18px; font-size: 10px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
    }

    /* Filter chips */
    .filter-chips { display: flex; flex-direction: column; gap: 1px; }
    .filter-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 5px;
      border: 1.5px solid transparent;
      background: none; cursor: pointer;
      font-family: inherit; font-size: 12px;
      color: var(--text2); text-align: left;
      transition: all .12s;
    }
    .filter-chip:hover {
      background: var(--bg); border-color: var(--border);
    }
    .filter-chip.active {
      background: var(--blue-bg); border-color: #bfdbfe;
      color: var(--blue); font-weight: 700;
    }
    .filter-chip-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .filter-chip-count {
      margin-left: auto; font-size: 10px; color: var(--faint);
      background: var(--bg); padding: 1px 5px; border-radius: 99px;
    }
    .filter-chip.active .filter-chip-count {
      background: rgba(37,99,235,.1); color: var(--blue);
    }

    /* Reset button */
    .filter-reset {
      margin-top: 6px; width: 100%;
      padding: 5px; border-radius: 5px;
      border: 1px solid var(--border); background: none;
      font-family: inherit; font-size: 11px; color: var(--muted);
      cursor: pointer; transition: all .12s;
    }
    .filter-reset:hover { border-color: var(--border2); color: var(--text2); background: var(--bg); }

    /* ── MAIN CONTENT ──────────────────────────── */
    .main-content {
      flex: 1; padding: 24px 28px; overflow-x: hidden;
      min-width: 0;
    }

    /* Section labels */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .section-label-num {
      font-size: 10px; font-weight: 800; letter-spacing: .1em;
      color: var(--white); background: var(--blue);
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .section-label-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .section-label-sub { font-size: 12px; color: var(--faint); margin-left: 2px; }

    /* ── ADD TASK PANEL ──────────────────────────  */
    .add-panel {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 24px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .add-panel-tabs {
      display: flex; border-bottom: 2px solid var(--border);
    }
    .add-tab {
      flex: 1; padding: 13px 0; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: all .15s; margin-bottom: -2px;
    }
    .add-tab.manual {
      color: var(--blue); background: var(--blue-bg);
      border-bottom: 2px solid var(--blue);
    }
    .add-tab.manual-off { color: var(--muted); background: #f8fafc; border-bottom: 2px solid transparent; }
    .add-tab.ai { color: #7c3aed; background: #f5f3ff; border-bottom: 2px solid #7c3aed; }
    .add-tab.ai-off { color: var(--muted); background: #f8fafc; border-bottom: 2px solid transparent; }

    /* Manual add form */
    .add-form-body { padding: 18px 20px; }
    .add-form-quick {
      display: grid;
      grid-template-columns: 1fr 120px 100px 100px auto;
      gap: 10px; align-items: end;
      margin-bottom: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .form-input, .form-select {
      padding: 10px 12px; border: 1.5px solid var(--border2);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      color: var(--text); outline: none; background: var(--white);
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .form-input::placeholder { color: var(--faint); }
    .form-select { cursor: pointer; }

    /* rows table */
    .new-rows-table {
      width: 100%; border-collapse: collapse;
      border: 1.5px solid #c7d8f0; border-radius: 8px; overflow: hidden;
    }
    .new-rows-table th {
      padding: 8px 10px; font-size: 11px; font-weight: 700;
      color: var(--muted); text-align: left;
      background: #f0f7ff; border-bottom: 1px solid #c7d8f0;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .new-rows-table td { padding: 7px 8px; border-bottom: 1px solid #dce9f9; }
    .new-rows-table tr:last-child td { border-bottom: none; }
    .new-rows-table tr:nth-child(odd) td { background: #eef4ff; }
    .new-rows-table tr:nth-child(even) td { background: #e8f0fe; }

    .cell-input, .cell-select {
      width: 100%; padding: 6px 8px;
      border: 1.5px solid #93b4f0; border-radius: 6px;
      font-size: 13px; font-family: inherit;
      color: var(--text); background: #fff; outline: none;
      transition: border-color .12s;
    }
    .cell-input:focus, .cell-select:focus { border-color: var(--blue); }
    .cell-input.task-inp { font-size: 13px; font-weight: 600; }

    .btn-add-row {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; border: none; padding: 9px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; transition: transform .12s, box-shadow .12s;
    }
    .btn-add-row:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
    .btn-save { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: #f1f5f9; color: var(--text2); border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-confirm { background: #fff; color: var(--blue); border: 1.5px solid #bfdbfe; padding: 4px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 700; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: none; padding: 4px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 700; }

    /* AI tab */
    .ai-body { padding: 18px 20px; }
    .ai-textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd6fe; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text);
      resize: vertical; line-height: 1.75; outline: none;
      background: #fdfcff; min-height: 90px;
      transition: border-color .15s;
    }
    .ai-textarea:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.1); }
    .btn-ai {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; border: none; padding: 10px 22px;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 12px;
    }

    /* ── TASK LIST ─────────────────────────────── */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .list-count {
      font-size: 13px; color: var(--muted); font-weight: 500;
    }
    .list-sort { display: flex; gap: 4px; }
    .sort-btn {
      padding: 5px 12px; border-radius: 7px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 12px; font-family: inherit; color: var(--muted);
      cursor: pointer; transition: all .12s;
    }
    .sort-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); font-weight: 700; }

    .task-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Table header */
    .task-thead {
      display: grid;
      grid-template-columns: 36px 1fr 90px 100px 96px 72px 88px 36px;
      gap: 0; background: #f8fafc;
      border-bottom: 2px solid var(--border);
      padding: 0 16px;
    }
    .task-th {
      padding: 10px 6px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--faint); cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 3px;
      transition: color .12s;
    }
    .task-th:hover { color: var(--blue); }
    .task-th .sort-icon { font-size: 9px; color: var(--border2); }
    .task-th.sorted { color: var(--blue); }
    .task-th.sorted .sort-icon { color: var(--blue); }

    /* Task row */
    .task-row {
      display: grid;
      grid-template-columns: 36px 1fr 90px 100px 96px 72px 88px 36px;
      gap: 0; padding: 0 16px;
      border-bottom: 1px solid var(--border);
      align-items: center; min-height: 54px;
      transition: background .12s;
      position: relative;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #f8fbff; }
    .task-row.urgent {
      background: #fff8f8;
      box-shadow: inset 3px 0 0 var(--urgent-c);
    }
    .task-row.urgent:hover { background: #fff0f0; }
    .task-row.high {
      background: #fffcf3;
      box-shadow: inset 3px 0 0 var(--high-c);
    }
    .task-row.high:hover { background: #fff8e6; }
    .task-row.done {
      opacity: .55;
    }
    .task-row.done:hover { opacity: .75; }

    /* Check circle */
    .check-btn {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--faint); background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
      padding: 0;
    }
    .check-btn:hover { border-color: #16a34a; background: #f0fdf4; }
    .check-btn.checked { border-color: #16a34a; background: #16a34a; color: #fff; }
    .check-btn.checked::after { content: '✓'; font-size: 11px; font-weight: 800; color: #fff; }

    /* Task name */
    .task-name-cell { padding: 6px 0; }
    .task-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1.4; cursor: pointer;
      transition: color .12s;
    }
    .task-name:hover { color: var(--blue); }
    .task-row.urgent .task-name { color: #991b1b; font-weight: 800; }
    .task-row.high   .task-name { color: #78350f; font-weight: 700; }
    .task-row.done   .task-name { text-decoration: line-through; color: var(--muted); }
    .task-det {
      font-size: 12px; color: var(--faint); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 340px;
    }
    .task-overdue { font-size: 11px; color: var(--urgent-c); margin-left: 6px; }
    .task-repeat {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 99px; background: #e0f2fe; color: #0369a1;
      margin-left: 6px; vertical-align: middle;
    }

    /* Assignee */
    .assignee-cell {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2); cursor: pointer;
    }
    .avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #818cf8);
      color: #fff; font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Due date */
    .due-cell { font-size: 13px; color: var(--text2); cursor: pointer; }
    .due-cell.overdue { color: var(--urgent-c); font-weight: 700; }

    /* Priority badge */
    .pri-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .pri-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pri-긴급 { background: var(--urgent-bg); color: var(--urgent-c); border: 1px solid var(--urgent-border); }
    .pri-높음 { background: var(--high-bg);   color: var(--high-c);   border: 1px solid var(--high-border); }
    .pri-보통 { background: var(--mid-bg);    color: var(--mid-c);    border: 1px solid var(--mid-border); }
    .pri-낮음 { background: var(--low-bg);    color: var(--low-c);    border: 1px solid var(--low-border); }

    /* Status badge */
    .st-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .st-대기   { background: var(--wait-bg);   color: var(--wait-c); }
    .st-진행중 { background: var(--inprog-bg); color: var(--inprog-c); }
    .st-검토   { background: var(--review-bg); color: var(--review-c); }
    .st-완료   { background: var(--done-bg);   color: var(--done-c); }

    /* Progress mini bar (task name 아래 시각용) */
    .prog-wrap { height: 4px; background: #f1f5f9; border-radius: 99px; margin-top: 5px; }
    .prog-bar  { height: 100%; border-radius: 99px; }

    /* Draggable progress bar (진행률 컬럼) */
    .prog-track {
      position: relative; height: 6px; background: #f1f5f9;
      border-radius: 99px; cursor: ew-resize; user-select: none;
      margin: 2px 0;
    }
    .prog-fill { height: 100%; border-radius: 99px; pointer-events: none; }
    .prog-handle {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: #fff; border: 2px solid #cbd5e1;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      pointer-events: none; transition: box-shadow .1s;
    }
    .prog-track:hover .prog-handle { box-shadow: 0 1px 8px rgba(0,0,0,.28); }
    .prog-tooltip {
      position: absolute; top: -22px; transform: translateX(-50%);
      font-size: 10px; font-weight: 700; color: #fff;
      padding: 1px 5px; border-radius: 4px;
      pointer-events: none; white-space: nowrap; display: none;
    }
    .prog-pct { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 3px; }

    /* Actions */
    .row-actions {
      display: flex; gap: 4px; opacity: 0;
      transition: opacity .12s;
    }
    .task-row:hover .row-actions { opacity: 1; }
    .action-btn {
      width: 26px; height: 26px; border-radius: 6px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 13px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .action-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg); }
    .action-btn.del:hover { border-color: var(--urgent-c); color: var(--urgent-c); background: #fff5f5; }

    /* Done section divider */
    .done-divider {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: #f8fafc;
      border-bottom: 1px solid var(--border);
      border-top: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .done-divider-text {
      font-size: 12px; font-weight: 700;
      color: var(--done-c); letter-spacing: .05em;
    }
    .done-divider-count {
      font-size: 11px; color: var(--faint);
      background: var(--done-bg); color: var(--done-c);
      padding: 1px 8px; border-radius: 99px;
    }
    .done-toggle { font-size: 10px; color: var(--faint); margin-left: auto; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 56px 20px; color: var(--faint);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; font-weight: 500; }

    /* ── MODAL ─────────────────────────────────── */
    .modal-mask {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.45); backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center; padding: 20px;

let filters = {proj:'', who:'', pri:'', st:''};
let sortKey = '';
let newRows  = [];

const today = () => new Date().toISOString().slice(0,10);
const isOD   = (d,s) => s !== '완료' && d && d < today();
const fD     = d => d ? d.slice(5).replace('-','/') : '—';
const gP     = id => PROJECTS.find(p=>p.id===id) || {id:0,name:'미분류',color:'#94a3b8'};
const priOrder = {긴급:0, 높음:1, 보통:2, 낮음:3};

function progColor(p) {
  if(p===0)   return '#e2e8f0';
  if(p===100) return '#16a34a';
  if(p>=80)   return '#ca8a04';
  if(p>=50)   return '#ea580c';
  return '#dc2626';
}

/* ── FILTER ──────────────────────────────────────── */
function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return todos.filter(t => {
    const p = gP(t.pid);
    return (!q || t.task.toLowerCase().includes(q) || t.who.includes(q) || p.name.toLowerCase().includes(q))
        && (!filters.proj || String(t.pid) === filters.proj)
        && (!filters.who  || t.who === filters.who)
        && (!filters.pri  || t.pri === filters.pri)
        && (!filters.st   || t.st  === filters.st);
  });
}

function sorted(list) {
  if (!sortKey) return list;
  return [...list].sort((a,b) => {
    if(sortKey === 'due') return (a.due||'9999').localeCompare(b.due||'9999');
    if(sortKey === 'pri') return (priOrder[a.pri]??9) - (priOrder[b.pri]??9);
    return 0;
  });
}

/* ── RENDER SIDEBAR CHIPS ────────────────────────── */
function buildChips(containerId, items, filterKey) {
  const el = document.getElementById(containerId);
  const total = todos.length;
  let html = `<button class="filter-chip ${filters[filterKey]===''?'active':''}" onclick="toggleFilter('${filterKey}','')">
    <span class="filter-chip-dot" style="background:#94a3b8"></span>전체
    <span class="filter-chip-count">${todos.length}</span>
  </button>`;
  items.forEach(it => {
    const cnt = todos.filter(t => String(t[filterKey === 'proj' ? 'pid' : filterKey]) === String(it.v)).length;
    html += `<button class="filter-chip ${filters[filterKey]===String(it.v)?'active':''}" onclick="toggleFilter('${filterKey}','${it.v}')">
      ${it.c ? `<span class="filter-chip-dot" style="background:${it.c}"></span>` : ''}
      ${it.l}
      <span class="filter-chip-count">${cnt}</span>
    </button>`;
  });
  el.innerHTML = html;
}

function renderSidebar() {
  buildChips('proj-chips', PROJECTS.map(p=>({v:String(p.id),l:p.name,c:p.color})), 'proj');
  buildChips('who-chips',  MEMBERS.map(m=>({v:m,l:m,c:null})), 'who');
  buildChips('pri-chips',  ['긴급','높음','보통','낮음'].map(p=>({v:p,l:p,c:PRI_COLOR[p]})), 'pri');
  buildChips('st-chips',   ['대기','진행중','검토','완료'].map(s=>({v:s,l:s,c:ST_COLOR[s]})), 'st');
}

function toggleFilter(key, val) {
  filters[key] = filters[key] === val ? '' : val;
  renderSidebar();
  renderTasks();
}

function resetFilters() {
  filters = {proj:'', who:'', pri:'', st:''};
  document.getElementById('search').value = '';
  renderSidebar();
  renderTasks();
}

/* ── RENDER TASKS ────────────────────────────────── */
function renderTasks() {
  const list  = sorted(filtered());
  const todo  = list.filter(t => t.st !== '완료');
  const done  = list.filter(t => t.st === '완료');
  const el    = document.getElementById('task-body');

  document.getElementById('list-sub').textContent   = `총 ${list.length}건${Object.values(filters).some(v=>v)||document.getElementById('search').value ? ' (필터 적용)' : ''}`;
  document.getElementById('list-count').textContent = `${todo.length}건 미완료 · ${done.length}건 완료`;
  document.getElementById('hdr-count').textContent  = `${todos.length}건`;

  // Search clear btn
  const sc = document.getElementById('search-clear');
  sc.style.display = document.getElementById('search').value ? 'flex' : 'none';

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없습니다</div></div>`;
    return;
  }

  let html = '';

  // ─ 미완료 rows ─
  todo.forEach(t => { html += rowHTML(t); });

  // ─ 완료 divider ─
  if (done.length) {
    html += `<div class="done-divider" onclick="toggleDone()">
      <span class="done-divider-text">✅ 완료된 업무</span>
      <span class="done-divider-count">${done.length}건</span>
      <span class="done-toggle" id="done-arrow">${doneOpen ? '▲ 접기' : '▼ 펼치기'}</span>
    </div>`;
    if (doneOpen) done.forEach(t => { html += rowHTML(t); });
  }

  el.innerHTML = html;
  initProgressBars();
}

function rowHTML(t) {
  const p    = gP(t.pid);
  const od   = isOD(t.due, t.st);
  const isDone = t.st === '완료';
  const cls  = isDone ? 'done' : t.pri==='긴급' ? 'urgent' : t.pri==='높음' ? 'high' : '';
  const pc   = progColor(t.progress || 0);
  const repeat = t.repeat && t.repeat !== '없음'
    ? `<span class="task-repeat">🔁 ${t.repeat}</span>` : '';

  return `<div class="task-row ${cls}" id="row-${t.id}">
    <div style="display:flex;align-items:center">
      <button class="check-btn ${isDone?'checked':''}" onclick="toggleDone_task(${t.id})" title="${isDone?'완료 취소':'완료 처리'}"></button>
    </div>
    <div class="task-name-cell">
      <div>
        <span class="task-name" onclick="openModal(${t.id})">${t.task}</span>
        ${od ? '<span class="task-overdue">⚠️ 마감 초과</span>' : ''}
        ${repeat}
      </div>
      ${t.det ? `<div class="task-det">${t.det}</div>` : ''}
    </div>
    <div onclick="event.stopPropagation()">
      <div class="prog-track" data-id="${t.id}">
        <div class="prog-fill" style="width:${t.progress||0}%;background:${pc}"></div>
        <div class="prog-handle" style="left:${t.progress||0}%;border-color:${t.progress?pc:'#cbd5e1'}"></div>
        <div class="prog-tooltip">${t.progress||0}%</div>
      </div>
      <div class="prog-pct">${t.progress||0}%</div>
    </div>
    <div class="assignee-cell">
      <div class="avatar">${t.who[0]}</div>
      <span style="font-size:13px">${t.who}</span>
    </div>
    <div class="due-cell ${od?'overdue':''}">${fD(t.due)}</div>
    <div>
      <span class="pri-badge pri-${t.pri}">
        <span class="pri-dot" style="background:${PRI_COLOR[t.pri]}"></span>${t.pri}
      </span>
    </div>
    <div>
      <span class="st-badge st-${t.st}">${t.st}</span>
    </div>
    <div class="row-actions">
      <button class="action-btn" onclick="openModal(${t.id})" title="편집">✏️</button>
      <button class="action-btn del" onclick="deleteTask(${t.id})" title="삭제">🗑</button>
    </div>
  </div>`;
}

function toggleDone() {
  doneOpen = !doneOpen;
  renderTasks();
}

/* ── DRAGGABLE PROGRESS BARS ─────────────────────── */
function initProgressBars() {
  document.querySelectorAll('.prog-track').forEach(track => {
    track.addEventListener('mousedown', onProgDown);
  });
}

function calcPct(track, clientX) {
  const rect = track.getBoundingClientRect();
  const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
  return Math.round(Math.round(x / rect.width * 10) * 10); // 10% 단위 스냅
}

function applyProgBar(track, pct) {
  const pc = progColor(pct);
  track.querySelector('.prog-fill').style.width      = pct + '%';
  track.querySelector('.prog-fill').style.background = pc;
  const handle = track.querySelector('.prog-handle');
  handle.style.left        = pct + '%';
  handle.style.borderColor = pct === 0 ? '#cbd5e1' : pc;
  const tooltip = track.querySelector('.prog-tooltip');
  tooltip.style.display    = pct > 0 ? 'block' : 'none';
  tooltip.style.left       = pct + '%';
  tooltip.textContent      = pct + '%';
  tooltip.style.background = pct === 100 ? '#16a34a' : pct >= 50 ? '#ca8a04' : '#ea580c';
}

function onProgDown(e) {
  e.stopPropagation();
  const track = e.currentTarget;
  const id    = parseInt(track.dataset.id);

  applyProgBar(track, calcPct(track, e.clientX));

  const onMove = ev => applyProgBar(track, calcPct(track, ev.clientX));

  const onUp = ev => {
    const pct = calcPct(track, ev.clientX);
    applyProgBar(track, pct);
    track.querySelector('.prog-tooltip').style.display = 'none';

    // todos 데이터 업데이트 (리렌더 없이 직접 반영)
    todos = todos.map(t => t.id === id ? {...t, progress: pct} : t);

    // 같은 행의 작은 바도 동기화
    const row  = track.closest('.task-row');
    if (row) {
      const miniBar = row.querySelector('.prog-bar');
      if (miniBar) { miniBar.style.width = pct + '%'; miniBar.style.background = progColor(pct); }
      const pctLabel = track.nextElementSibling;
      if (pctLabel) pctLabel.textContent = pct + '%';
    }

    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };

  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

/* ── TASK ACTIONS ────────────────────────────────── */
function toggleDone_task(id) {
  const t = todos.find(t=>t.id===id);
  if (!t) return;
  const newSt = t.st === '완료' ? '대기' : '완료';
  const newProg = newSt === '완료' ? 100 : t.progress;
  todos = todos.map(x => x.id===id ? {...x, st:newSt, progress:newProg} : x);
  renderSidebar();
  renderTasks();
  flash(newSt === '완료' ? '✅ 완료 처리했습니다' : '↩️ 완료 취소했습니다', newSt==='완료'?'ok':'err');
}

function deleteTask(id) {
  todos = todos.filter(t=>t.id!==id);
  renderSidebar();
  renderTasks();
  flash('🗑 삭제했습니다', 'err');
}

/* ── NEW ROWS ────────────────────────────────────── */
function addRow() {
  newRows.push({pid:'', task:'', who:'', due:'', pri:'보통', repeat:'없음', det:''});
  renderNewRows();
}

function renderNewRows() {
  const el = document.getElementById('new-rows-wrap');
  document.getElementById('btn-save-all').style.display   = newRows.length ? '' : 'none';
  document.getElementById('btn-cancel-all').style.display = newRows.length ? '' : 'none';
  if (!newRows.length) { el.innerHTML = ''; return; }

  let html = `<div style="border:1.5px solid #c7d8f0;border-radius:8px;overflow:hidden;margin-bottom:12px">
    <table class="new-rows-table" style="width:100%;table-layout:fixed">
      <colgroup>
        <col style="width:130px"/><col/><col style="width:100px"/>
        <col style="width:110px"/><col style="width:72px"/><col style="width:72px"/><col style="width:56px"/>
      </colgroup>
      <thead><tr>
        <th>프로젝트</th><th>업무내용 *</th><th>담당자</th>
        <th>마감일</th><th>우선순위</th><th>반복</th><th style="text-align:center">저장</th>
      </tr></thead><tbody>`;

  newRows.forEach((r,i) => {
    html += `<tr>
      <td><select class="cell-select" onchange="updateRow(${i},'pid',this.value)">
        <option value="">프로젝트 선택</option>
        ${PROJECTS.map(p=>`<option value="${p.id}" ${r.pid==p.id?'selected':''}>${p.name}</option>`).join('')}
      </select></td>
      <td><input class="cell-input task-inp" placeholder="업무 내용 *"
        value="${r.task}" oninput="updateRow(${i},'task',this.value)"
        onkeydown="if(event.key==='Enter'&&this.value)saveRow(${i})"
        ${i===newRows.length-1?'autofocus':''} /></td>
      <td><select class="cell-select" onchange="updateRow(${i},'who',this.value)">
        <option value="">담당자 선택</option>
        ${MEMBERS.map(m=>`<option ${r.who===m?'selected':''}>${m}</option>`).join('')}
      </select></td>
      <td><input type="date" class="cell-input" value="${r.due}" onchange="updateRow(${i},'due',this.value)" /></td>
      <td><select class="cell-select" onchange="updateRow(${i},'pri',this.value)">
        ${['긴급','높음','보통','낮음'].map(p=>`<option ${r.pri===p?'selected':''}>${p}</option>`).join('')}
      </select></td>
      <td><select class="cell-select" onchange="updateRow(${i},'repeat',this.value)">
        ${['없음','매일','매주','매월'].map(v=>`<option ${r.repeat===v?'selected':''}>${v}</option>`).join('')}
      </select></td>
      <td style="text-align:center;display:flex;gap:3px;padding:6px 4px">
        <button class="btn-confirm" onclick="saveRow(${i})" title="저장">✓</button>
        <button class="btn-delete"  onclick="removeRow(${i})" title="삭제">✕</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function updateRow(i, key, val) { newRows[i][key] = val; }
function removeRow(i) { newRows.splice(i,1); renderNewRows(); }

function saveRow(i) {
  const r = newRows[i];
  if (!r.task) { flash('업무 내용을 입력하세요', 'err'); return; }
  todos = [...todos, {
    id: nextId++, pid: r.pid ? parseInt(r.pid) : 0,
    task: r.task, who: r.who||'미배정', due: r.due||'',
    pri: r.pri||'보통', st: '대기', det: r.det||'',
    repeat: r.repeat||'없음', progress: 0
  }];
  newRows.splice(i, 1);
  renderNewRows();
  renderSidebar();
  renderTasks();
  flash('✅ 등록했습니다');
}

function saveAllRows() {
  const valid = newRows.filter(r=>r.task);
  if (!valid.length) { flash('업무 내용을 입력하세요', 'err'); return; }
  valid.forEach(r => {
    todos = [...todos, {
      id: nextId++, pid: r.pid ? parseInt(r.pid) : 0,
      task: r.task, who: r.who||'미배정', due: r.due||'',
      pri: r.pri||'보통', st: '대기', det: r.det||'',
      repeat: r.repeat||'없음', progress: 0
    }];
  });
  clearRows();
  renderSidebar();
  renderTasks();
  flash(`✅ ${valid.length}개 등록했습니다`);
}

function clearRows() { newRows = []; renderNewRows(); }

/* ── MODAL ───────────────────────────────────────── */
let editingId = null;
function openModal(id) {
  const t = todos.find(t=>t.id===id);
  if (!t) return;
  editingId = id;
  document.getElementById('m-id').value    = id;
  document.getElementById('m-title').textContent = '업무 편집';
  document.getElementById('m-task').value  = t.task;
  document.getElementById('m-due').value   = t.due || '';
  document.getElementById('m-det').value   = t.det || '';

  // Populate selects
  const mProj = document.getElementById('m-proj');
  mProj.innerHTML = PROJECTS.map(p=>`<option value="${p.id}" ${t.pid===p.id?'selected':''}>${p.name}</option>`).join('');
  const mWho = document.getElementById('m-who');
  mWho.innerHTML = MEMBERS.map(m=>`<option ${t.who===m?'selected':''}>${m}</option>`).join('');
  document.getElementById('m-pri').value    = t.pri;
  document.getElementById('m-st').value     = t.st;
  document.getElementById('m-repeat').value = t.repeat || '없음';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
}

function onModalMaskClick(e) {
  if (e.target.id === 'modal') closeModal();
}

function saveModal() {
  const task = document.getElementById('m-task').value.trim();
  if (!task) { flash('업무 내용을 입력하세요', 'err'); return; }
  const id   = parseInt(document.getElementById('m-id').value);
  todos = todos.map(t => t.id !== id ? t : {
    ...t,
    task:   task,
    pid:    parseInt(document.getElementById('m-proj').value),
    who:    document.getElementById('m-who').value,
    due:    document.getElementById('m-due').value,
    pri:    document.getElementById('m-pri').value,
    st:     document.getElementById('m-st').value,
    det:    document.getElementById('m-det').value,
    repeat: document.getElementById('m-repeat').value,
  });
  closeModal();
  renderSidebar();
  renderTasks();
  flash('✅ 저장했습니다');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ── SORT ────────────────────────────────────────── */
function setSort(key) {
  sortKey = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const target = key === 'due' ? 'sort-due' : key === 'pri' ? 'sort-pri' : 'sort-none';
  document.getElementById(target)?.classList.add('active');
  renderTasks();
}

/* ── ADD TAB ─────────────────────────────────────── */
function switchAddTab(tab) {
  const isManual = tab === 'manual';
  document.getElementById('tab-manual').className = `add-tab ${isManual ? 'manual' : 'manual-off'}`;
  document.getElementById('tab-ai').className     = `add-tab ${!isManual ? 'ai' : 'ai-off'}`;
  document.getElementById('panel-manual').style.display = isManual ? '' : 'none';
  document.getElementById('panel-ai').style.display     = isManual ? 'none' : '';
}

/* ── SEARCH ──────────────────────────────────────── */
function applyFilters() { renderSidebar(); renderTasks(); }
function clearSearch() { document.getElementById('search').value = ''; applyFilters(); }

/* ── TOAST ───────────────────────────────────────── */
let toastTimer;
function flash(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

/* ── INIT ────────────────────────────────────────── */
renderSidebar();
renderTasks();
</script>
</body>
</html>
