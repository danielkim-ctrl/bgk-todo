<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPERATIONS — 팀 TODO 통합관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─────────────────────────────── */
    :root {
      --bg:       #09090f;
      --bg2:      #111118;
      --bg3:      #18181f;
      --border:   #ffffff0d;
      --border2:  #ffffff18;
      --gold:     #d4a853;
      --gold2:    #f0c96c;
      --cream:    #f5efe0;
      --muted:    #6b6b7e;
      --text:     #e8e4d9;
      --text2:    #b0a898;

      --red:    #e05252;
      --orange: #d4813a;
      --blue:   #5b8fd4;
      --slate:  #7a8a9e;
      --green:  #52a87a;

      --proj1: #8b5cf6;
      --proj2: #14b8a6;
      --proj3: #3b82f6;
      --proj4: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.6;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border2);
      background: rgba(9,9,15,0.92);
      backdrop-filter: blur(20px);
      padding: 0 40px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      display: flex; align-items: baseline; gap: 12px;
    }
    .logo-word {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--cream);
      letter-spacing: 0.12em;
    }
    .logo-slash {
      color: var(--gold);
      font-size: 1.1rem;
    }
    .logo-sub {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex; align-items: center; gap: 20px;
    }
    .header-date {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .header-pulse {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; color: var(--green); letter-spacing: 0.1em;
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(82,168,122,0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(82,168,122,0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(82,168,122,0); }
      100% { box-shadow: 0 0 0 0 rgba(82,168,122,0); }
    }

    /* ─── HERO BANNER ───────────────────────── */
    .hero {
      padding: 56px 40px 40px;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .hero::after {
      content: 'OPS';
      position: absolute;
      right: -20px; top: -10px;
      font-family: 'DM Serif Display', serif;
      font-size: 18vw;
      color: #ffffff03;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .hero-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      line-height: 1.05;
      color: var(--cream);
      margin-bottom: 20px;
    }
    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-stats {
      display: flex; gap: 48px; margin-top: 32px;
    }
    .stat-block {}
    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      color: var(--cream);
      line-height: 1;
    }
    .stat-num span { color: var(--gold); }
    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .hero-divider {
      width: 1px; background: var(--border2);
      align-self: stretch;
    }

    /* ─── LAYOUT ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 56px - 220px);
    }

    /* ─── SIDEBAR ────────────────────────────── */
    aside {
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 36px;
    }
    .sidebar-label {
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Project nav */
    .proj-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      border: 1px solid transparent;
    }
    .proj-item:hover, .proj-item.active {
      background: var(--bg3);
      border-color: var(--border2);
    }
    .proj-item.active .proj-dot::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.4;
    }
    .proj-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; position: relative;
    }
    .proj-name {
      font-size: 0.72rem;
      color: var(--text2);
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proj-item.active .proj-name { color: var(--text); }
    .proj-count {
      font-size: 0.62rem;
      color: var(--muted);
      background: var(--bg);
      padding: 1px 6px; border-radius: 99px;
    }

    /* Member list */
    .member-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .member-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
      flex-shrink: 0;
    }
    .member-info { flex: 1; }
    .member-name { font-size: 0.72rem; color: var(--text2); }
    .member-tasks { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }
    .member-bar-wrap {
      height: 2px; background: var(--bg3); border-radius: 1px; margin-top: 4px;
    }
    .member-bar {
      height: 100%; border-radius: 1px;
      transition: width 0.8s ease;
    }

    /* Priority filter */
    .filter-row {
      display: flex; flex-direction: column; gap: 6px;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 5px;
      border: 1px solid transparent;
      background: none; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--muted);
      transition: all 0.15s;
      text-align: left;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--bg3);
      border-color: var(--border2);
      color: var(--text);
    }
    .filter-pip {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .filter-count {
      margin-left: auto;
      font-size: 0.6rem; color: var(--muted);
    }

    /* ─── MAIN CONTENT ──────────────────────── */
    main {
      padding: 32px 36px;
    }

    /* Tab bar */
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border2);
      margin-bottom: 28px;
    }
    .tab {
      padding: 10px 20px;
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: none; background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
    }
    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* Section heading */
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--cream);
    }
    .section-meta {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* ─── PROJECT CARDS GRID ─────────────────── */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .proj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .proj-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
    }
    .proj-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--proj-color);
    }
    .proj-card-num {
      font-family: 'DM Serif Display', serif;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-bottom: 10px;
    }
    .proj-card-name {
      font-size: 0.78rem;
      color: var(--text);
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .proj-card-stats {
      display: flex; gap: 16px;
      margin-bottom: 14px;
    }
    .proj-card-stat { }
    .proj-card-stat-val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--cream);
    }
    .proj-card-stat-lbl {
      font-size: 0.56rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .proj-prog-wrap {
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
    }
    .proj-prog-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--proj-color);
      transition: width 1.2s ease;
      width: 0;
    }
    .proj-prog-label {
      display: flex; justify-content: space-between;
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── TASK TABLE ─────────────────────────── */
    .task-table-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .task-table-header {
      display: grid;
      grid-template-columns: 32px 1fr 90px 80px 70px 90px 80px;
      gap: 0;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .th {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .task-row {
      display: grid;
      grid-template-columns: 32px 1fr 90px 80px 70px 90px 80px;
      gap: 0;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.12s;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
      cursor: pointer;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--bg3); }

    .task-idx {
      font-size: 0.6rem;
      color: var(--muted);
    }
    .task-name-wrap {}
    .task-name {
      font-size: 0.75rem;
      color: var(--text);
      line-height: 1.35;
    }
    .task-proj-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .task-proj-dot {
      width: 5px; height: 5px; border-radius: 50%;
    }
    .task-who {
      font-size: 0.68rem;
      color: var(--text2);
    }
    .task-due {
      font-size: 0.68rem;
      color: var(--text2);
    }
    .task-due.overdue { color: var(--red); }

    .pri-badge {
      display: inline-block;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .pri-긴급  { background: rgba(224,82,82,0.12);  color: var(--red); }
    .pri-높음  { background: rgba(212,129,58,0.12); color: var(--orange); }
    .pri-보통  { background: rgba(91,143,212,0.12); color: var(--blue); }
    .pri-낮음  { background: rgba(122,138,158,0.12);color: var(--slate); }

    .st-badge {
      display: inline-block;
      font-size: 0.58rem;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .st-대기   { background: rgba(107,107,126,0.12); color: var(--muted); }
    .st-진행중 { background: rgba(91,143,212,0.12);  color: var(--blue); }
    .st-검토   { background: rgba(212,129,58,0.12);  color: var(--orange); }
    .st-완료   { background: rgba(82,168,122,0.12);  color: var(--green); }

    .prog-mini-wrap {
      height: 2px;
      background: var(--bg3);
      border-radius: 1px;
      margin-top: 4px;
    }
    .prog-mini-bar {
      height: 100%;
      border-radius: 1px;
      background: var(--gold);
    }
    .st-완료 ~ .prog-mini-wrap .prog-mini-bar { background: var(--green); }

    /* Progress column cell */
    .task-prog-cell { display: flex; flex-direction: column; justify-content: center; }
    .prog-pct { font-size: 0.62rem; color: var(--muted); margin-bottom: 4px; }

    /* ─── URGENCY BAND ───────────────────────── */
    .urgency-band {
      background: rgba(224,82,82,0.06);
      border: 1px solid rgba(224,82,82,0.15);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 16px;
    }
    .urgency-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .urgency-title {
      font-size: 0.7rem;
      color: var(--red);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .urgency-items {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .urgency-chip {
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(224,82,82,0.1);
      border: 1px solid rgba(224,82,82,0.2);
      color: var(--text2);
    }

    /* ─── EMPTY STATE ────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ─── MODAL ──────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: all;
    }
    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 100%; max-width: 500px;
      padding: 32px;
      transform: translateY(16px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal-box {
      transform: translateY(0);
    }
    .modal-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-proj-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.62rem; color: var(--muted);
      background: var(--bg3); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
      margin-bottom: 10px;
    }
    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      line-height: 1.2;
    }
    .modal-close {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.15s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--border2); }
    .modal-meta {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .modal-field-label {
      font-size: 0.58rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 4px;
    }
    .modal-field-val {
      font-size: 0.78rem; color: var(--text);
    }
    .modal-detail {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px;
      font-size: 0.75rem; color: var(--text2);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .modal-prog-wrap {
      height: 4px; background: var(--bg);
      border-radius: 2px; overflow: hidden;
    }
    .modal-prog-bar {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width 0.8s ease;
    }

    /* ─── ANIMATIONS ─────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── SCROLLBAR ──────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-word">OPERATIONS</span>
    <span class="logo-slash">/</span>
    <span class="logo-sub">팀 TODO 통합관리</span>
  </div>
  <div class="header-right">
    <span class="header-date" id="hdr-date"></span>
    <div class="header-pulse">
      <div class="pulse-dot"></div>
      <span>LIVE</span>
    </div>
  </div>
</header>

<!-- ── HERO ───────────────────────────── -->
<div class="hero">
  <div class="hero-eyebrow">2026 아시아 / 구매 / 수출 작전</div>
  <h1 class="hero-title">팀 업무<br/><em>현황판</em></h1>
  <div class="hero-stats" id="hero-stats">
    <div class="stat-block">
      <div class="stat-num" id="s-total">—</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="hero-divider"></div>
    <div class="stat-block">
      <div class="stat-num" id="s-inprog">—</div>
      <div class="stat-label">진행중</div>
    </div>
    <div class="hero-divider"></div>
    <div class="stat-block">
      <div class="stat-num" id="s-urgent">—<span style="font-size:1rem;color:var(--red)">!</span></div>
      <div class="stat-label">긴급</div>
    </div>
    <div class="hero-divider"></div>
    <div class="stat-block">
      <div class="stat-num" id="s-done">—</div>
      <div class="stat-label">완료</div>
    </div>
  </div>
</div>

<!-- ── LAYOUT ──────────────────────────── -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <!-- Projects -->
    <div class="sidebar-section">
      <div class="sidebar-label">Projects</div>
      <div id="proj-nav"></div>
    </div>

    <!-- Priority Filter -->
    <div class="sidebar-section">
      <div class="sidebar-label">Priority</div>
      <div class="filter-row" id="pri-filter"></div>
    </div>

    <!-- Members -->
    <div class="sidebar-section">
      <div class="sidebar-label">Team</div>
      <div id="member-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <!-- Urgency band -->
    <div class="urgency-band" id="urgency-band" style="display:none">
      <div class="urgency-icon">⚡</div>
      <div>
        <div class="urgency-title">마감 임박 / 긴급</div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab active" data-tab="list" onclick="switchTab('list', this)">목록 보기</button>
      <button class="tab" data-tab="projects" onclick="switchTab('projects', this)">프로젝트 현황</button>
    </div>

    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="section-head">
        <h2 class="section-title" id="list-title">전체 업무</h2>
        <span class="section-meta" id="list-meta"></span>
      </div>
      <div class="task-table-wrap">
        <div class="task-table-header">
          <div class="th">#</div>
          <div class="th">업무</div>
          <div class="th">담당자</div>
          <div class="th">마감일</div>
          <div class="th">우선순위</div>
          <div class="th">상태</div>
          <div class="th">진행률</div>
        </div>
        <div id="task-list"></div>
      </div>
    </div>

    <!-- PROJECT VIEW -->
    <div id="view-projects" style="display:none">
      <div class="section-head">
        <h2 class="section-title">프로젝트 현황</h2>
        <span class="section-meta" id="proj-meta"></span>
      </div>
      <div class="proj-grid" id="proj-cards"></div>
    </div>
  </main>
</div>

<!-- ── TASK DETAIL MODAL ──────────────── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-top">
      <div>
        <div class="modal-proj-chip" id="m-proj"></div>
        <h2 class="modal-title" id="m-title">—</h2>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-detail" id="m-det">—</div>
    <div>
      <div class="modal-field-label" style="margin-bottom:8px">진행률 <span id="m-pct"></span></div>
      <div class="modal-prog-wrap"><div class="modal-prog-bar" id="m-prog"></div></div>
    </div>
  </div>
</div>

<script>

  {id:3,  pid:1,task:"중국 샘플북 인쇄 발주",     who:"복경민",due:"2026-04-14",pri:"보통", st:"대기",  det:"기업별 3권씩 별도 제작",progress:0},

  {id:5,  pid:2,task:"일본 사전간담회 자료 준비", who:"김현지",due:"2026-04-17",pri:"높음", st:"대기",  det:"4월 21일 역삼 간담회용",progress:0},
  {id:6,  pid:2,task:"일본 자료제작 방향 정리",   who:"이연수",due:"2026-04-10",pri:"보통", st:"진행중",det:"내부 논의 후 결정",progress:40},
  {id:7,  pid:3,task:"해외 바이어 리스트 정리",   who:"박정찬",due:"2026-04-05",pri:"높음", st:"진행중",det:"아시아 지역 우선",progress:55},
  {id:8,  pid:3,task:"구매상담회 부스 배치안 작성",who:"김대윤",due:"2026-04-12",pri:"보통", st:"대기",  det:"",progress:0},
  {id:9,  pid:3,task:"통역 인력 섭외",            who:"이연수",due:"2026-04-08",pri:"낮음", st:"완료",  det:"중국어/일본어 각 2명",progress:100},
  {id:10, pid:4,task:"수출 상담 매칭 시스템 점검",who:"복경민",due:"2026-04-03",pri:"긴급",st:"진행중",det:"매칭 알고리즘 테스트",progress:30},
  {id:11, pid:4,task:"참가기업 홍보물 제작 지원", who:"박정찬",due:"2026-04-18",pri:"보통", st:"대기",  det:"굿즈 vs 자체 프로모션 결정 필요",progress:0},
  {id:12, pid:4,task:"수출 성과보고서 양식 작성", who:"김혜민",due:"2026-04-22",pri:"낮음", st:"대기",  det:"전년도 양식 기반 업데이트",progress:0},
  {id:13, pid:1,task:"토/일 프로그램 기획안",     who:"김대윤",due:"2026-04-09",pri:"높음", st:"대기",  det:"주말 프로그램 구성 고민",progress:10},
  {id:14, pid:2,task:"CKL 착수보고 자료 준비",    who:"복경민",due:"2026-04-10",pri:"긴급",st:"대기",  det:"4월 10일 금요일 보고",progress:0},
  {id:15, pid:3,task:"중국 사전간담회 장소 예약", who:"김혜민",due:"2026-04-14",pri:"보통", st:"완료",  det:"4월 14일 화 역삼",progress:100},
  {id:16, pid:4,task:"북경센터 컨택포인트 연락",  who:"이연수",due:"2026-03-28",pri:"긴급",st:"검토",  det:"153㎡ 변경건 소통",progress:50},
  {id:17, pid:2,task:"가예약 장소 기한 확인",     who:"김혜민",due:"2026-03-29",pri:"높음", st:"진행중",det:"니카이 + 대체장소",progress:70},
  {id:18, pid:4,task:"전시장 브로셔 컨택 정리",   who:"김현지",due:"2026-04-01",pri:"보통", st:"대기",  det:"브릿징 통해 직접 연락",progress:0},
  {id:19, pid:1,task:"주간 진행상황 팀 공유",     who:"김대윤",due:"2026-03-31",pri:"보통", st:"대기",  det:"매주 월요일 슬랙 보고",progress:0},
  {id:20, pid:3,task:"일일 바이어 문의 확인",     who:"박정찬",due:"2026-03-26",pri:"높음", st:"대기",  det:"이메일 및 메신저 확인",progress:0},
];

const MEMBER_COLORS = {
  김대윤:"#8b5cf6", 김현지:"#14b8a6", 복경민:"#3b82f6",
  박정찬:"#f59e0b", 이연수:"#e05252", 김혜민:"#52a87a"
};

// ── STATE ─────────────────────────────────────────────────────
let activeProjId = null;
let activePri    = null;
let activeTab    = 'list';

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderDate();
  renderHeroStats();
  renderProjNav();
  renderPriFilter();
  renderMembers();
  renderUrgency();
  renderTasks();
  renderProjCards();
  renderProjMeta();

  // Animate progress bars after load
  setTimeout(() => {
    document.querySelectorAll('.proj-prog-bar[data-w]').forEach(b => {
      b.style.width = b.dataset.w + '%';
    });
  }, 300);
});

// ── DATE ──────────────────────────────────────────────────────
function renderDate() {
  const d = new Date();
  const s = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('hdr-date').textContent = s;
}

// ── HERO STATS ────────────────────────────────────────────────
function renderHeroStats() {
  document.getElementById('s-total').textContent  = TODOS.length;
  document.getElementById('s-inprog').textContent = TODOS.filter(t=>t.st==='진행중').length;
  document.getElementById('s-urgent').innerHTML   = TODOS.filter(t=>t.pri==='긴급').length +
    '<span style="font-size:1rem;color:var(--red)">!</span>';
  document.getElementById('s-done').textContent   = TODOS.filter(t=>t.st==='완료').length;
}

// ── PROJECT NAV ───────────────────────────────────────────────
function renderProjNav() {
  const el = document.getElementById('proj-nav');
  let html = `
    <div class="proj-item ${activeProjId===null?'active':''}" onclick="filterProj(null)">
      <div class="proj-dot" style="background:#6b6b7e"></div>
      <span class="proj-name">전체 프로젝트</span>
      <span class="proj-count">${TODOS.length}</span>
    </div>`;
  PROJECTS.forEach(p => {
    const cnt = TODOS.filter(t=>t.pid===p.id).length;
    html += `
      <div class="proj-item ${activeProjId===p.id?'active':''}" onclick="filterProj(${p.id})">
        <div class="proj-dot" style="background:${p.color}"></div>
        <span class="proj-name">${p.name}</span>
        <span class="proj-count">${cnt}</span>
      </div>`;
  });
  el.innerHTML = html;
}

// ── PRIORITY FILTER ───────────────────────────────────────────
function renderPriFilter() {
  const el = document.getElementById('pri-filter');
  const colors = {긴급:'var(--red)', 높음:'var(--orange)', 보통:'var(--blue)', 낮음:'var(--slate)'};
  let html = `
    <button class="filter-btn ${activePri===null?'active':''}" onclick="filterPri(null)">
      <span class="filter-pip" style="background:var(--muted)"></span>전체
      <span class="filter-count">${TODOS.length}</span>
    </button>`;
  ['긴급','높음','보통','낮음'].forEach(p => {
    const cnt = TODOS.filter(t=>t.pri===p).length;
    html += `
      <button class="filter-btn ${activePri===p?'active':''}" onclick="filterPri('${p}')">
        <span class="filter-pip" style="background:${colors[p]}"></span>${p}
        <span class="filter-count">${cnt}</span>
      </button>`;
  });
  el.innerHTML = html;
}

// ── MEMBERS ───────────────────────────────────────────────────
function renderMembers() {
  const el = document.getElementById('member-list');
  const members = ['김대윤','김현지','복경민','박정찬','이연수','김혜민'];
  const maxTasks = Math.max(...members.map(m => TODOS.filter(t=>t.who===m).length));
  let html = '';
  members.forEach(m => {
    const tasks = TODOS.filter(t=>t.who===m);
    const done  = tasks.filter(t=>t.st==='완료').length;
    const pct   = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const color = MEMBER_COLORS[m] || '#6b6b7e';
    html += `
      <div class="member-row">
        <div class="member-avatar" style="background:${color}22;color:${color}">${m[0]}</div>
        <div class="member-info">
          <div class="member-name">${m}</div>
          <div class="member-tasks">${tasks.length}개 · 완료 ${done}개</div>
          <div class="member-bar-wrap">
            <div class="member-bar" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
  });
  el.innerHTML = html;
}

// ── URGENCY ───────────────────────────────────────────────────
function renderUrgency() {
  const today = new Date().toISOString().slice(0,10);
  const urgent = TODOS.filter(t =>
    t.st !== '완료' && (t.pri === '긴급' || t.due <= today)
  ).slice(0, 6);
  if (!urgent.length) return;
  const band = document.getElementById('urgency-band');
  const items = document.getElementById('urgency-items');
  band.style.display = 'flex';
  items.innerHTML = urgent.map(t =>
    `<span class="urgency-chip">${t.task} · ${t.who}</span>`
  ).join('');
}

// ── TASKS ─────────────────────────────────────────────────────
function filteredTodos() {
  let list = [...TODOS];
  if (activeProjId) list = list.filter(t=>t.pid===activeProjId);
  if (activePri)    list = list.filter(t=>t.pri===activePri);
  return list;
}

function renderTasks() {
  const list = filteredTodos();
  const el   = document.getElementById('task-list');
  const today = new Date().toISOString().slice(0,10);

  document.getElementById('list-title').textContent =
    activeProjId ? PROJECTS.find(p=>p.id===activeProjId)?.name : '전체 업무';
  document.getElementById('list-meta').textContent =
    `${list.length} tasks`;

  if (!list.length) {
    el.innerHTML = `<div class="empty">표시할 업무가 없습니다</div>`;
    return;
  }

  el.innerHTML = list.map((t, i) => {
    const proj  = PROJECTS.find(p=>p.id===t.pid) || {name:'—',color:'#6b6b7e'};
    const od    = t.st !== '완료' && t.due <= today;
    const delay = Math.min(i * 30, 400);
    return `
      <div class="task-row" style="animation-delay:${delay}ms" onclick="openModal(${t.id})">
        <span class="task-idx">${String(i+1).padStart(2,'0')}</span>
        <div class="task-name-wrap">
          <div class="task-name">${t.task}</div>
          <div class="task-proj-chip">
            <div class="task-proj-dot" style="background:${proj.color}"></div>
            ${proj.name}
          </div>
        </div>
        <span class="task-who">${t.who}</span>
        <span class="task-due ${od?'overdue':''}">${t.due.slice(5).replace('-','/')}</span>
        <span class="pri-badge pri-${t.pri}">${t.pri}</span>
        <span class="st-badge st-${t.st}">${t.st}</span>
        <div class="task-prog-cell">
          <span class="prog-pct">${t.progress}%</span>
          <div class="prog-mini-wrap">
            <div class="prog-mini-bar" style="width:${t.progress}%;background:${t.st==='완료'?'var(--green)':'var(--gold)'}"></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── PROJECT CARDS ─────────────────────────────────────────────
function renderProjCards() {
  const el = document.getElementById('proj-cards');
  el.innerHTML = PROJECTS.map((p, i) => {
    const tasks   = TODOS.filter(t=>t.pid===p.id);
    const done    = tasks.filter(t=>t.st==='완료').length;
    const inprog  = tasks.filter(t=>t.st==='진행중').length;
    const urgent  = tasks.filter(t=>t.pri==='긴급').length;
    const avgProg = tasks.length ? Math.round(tasks.reduce((s,t)=>s+t.progress,0)/tasks.length) : 0;
    return `
      <div class="proj-card" style="--proj-color:${p.color};animation-delay:${i*80}ms">
        <div class="proj-card-num">PROJECT ${String(i+1).padStart(2,'0')}</div>
        <div class="proj-card-name">${p.name}</div>
        <div class="proj-card-stats">
          <div class="proj-card-stat">
            <div class="proj-card-stat-val">${tasks.length}</div>
            <div class="proj-card-stat-lbl">Tasks</div>
          </div>
          <div class="proj-card-stat">
            <div class="proj-card-stat-val" style="color:var(--blue)">${inprog}</div>
            <div class="proj-card-stat-lbl">진행중</div>
          </div>
          <div class="proj-card-stat">
            <div class="proj-card-stat-val" style="color:var(--green)">${done}</div>
            <div class="proj-card-stat-lbl">완료</div>
          </div>
          ${urgent ? `<div class="proj-card-stat">
            <div class="proj-card-stat-val" style="color:var(--red)">${urgent}</div>
            <div class="proj-card-stat-lbl">긴급</div>
          </div>` : ''}
        </div>
        <div class="proj-prog-wrap">
          <div class="proj-prog-bar" data-w="${avgProg}"></div>
        </div>
        <div class="proj-prog-label">
          <span>평균 진행률</span>
          <span>${avgProg}%</span>
        </div>
      </div>`;
  }).join('');
}

function renderProjMeta() {
  document.getElementById('proj-meta').textContent =
    `${PROJECTS.length} active projects · ${TODOS.length} tasks`;
}

// ── FILTER ACTIONS ────────────────────────────────────────────
function filterProj(id) {
  activeProjId = id;
  renderProjNav();
  renderTasks();
}
function filterPri(pri) {
  activePri = pri;
  renderPriFilter();
  renderTasks();
}

// ── TAB SWITCH ────────────────────────────────────────────────
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-list').style.display     = tab==='list'     ? '' : 'none';
  document.getElementById('view-projects').style.display = tab==='projects' ? '' : 'none';

  if (tab === 'projects') {
    setTimeout(() => {
      document.querySelectorAll('.proj-prog-bar[data-w]').forEach(b => {
        b.style.width = b.dataset.w + '%';
      });
    }, 100);
  }
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  const t = TODOS.find(t=>t.id===id);
  if (!t) return;
  const proj = PROJECTS.find(p=>p.id===t.pid) || {name:'—',color:'#6b6b7e'};
  const today = new Date().toISOString().slice(0,10);
  const od = t.st !== '완료' && t.due <= today;

  document.getElementById('m-proj').innerHTML =
    `<div class="task-proj-dot" style="background:${proj.color}"></div>${proj.name}`;
  document.getElementById('m-title').textContent = t.task;
  document.getElementById('m-meta').innerHTML = `
    <div>
      <div class="modal-field-label">담당자</div>
      <div class="modal-field-val">${t.who}</div>
    </div>
    <div>
      <div class="modal-field-label">마감일</div>
      <div class="modal-field-val ${od?'':''}">
        <span style="${od?'color:var(--red)':''}">${t.due}${od?' ⚠':''}</span>
      </div>
    </div>
    <div>
      <div class="modal-field-label">우선순위</div>
      <div class="modal-field-val"><span class="pri-badge pri-${t.pri}">${t.pri}</span></div>
    </div>
    <div>
      <div class="modal-field-label">상태</div>
      <div class="modal-field-val"><span class="st-badge st-${t.st}">${t.st}</span></div>
    </div>`;
  document.getElementById('m-det').textContent = t.det || '세부 내용 없음';
  document.getElementById('m-pct').textContent = t.progress + '%';
  const bar = document.getElementById('m-prog');
  bar.style.width = '0%';
  setTimeout(() => { bar.style.width = t.progress + '%'; }, 50);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e.target.id === 'modal') closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});
</script>
</body>
</html>
